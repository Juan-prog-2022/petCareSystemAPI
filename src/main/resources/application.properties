spring.application.name=petshop-doguito

# Configuracion de PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Configuracion de JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.continue-on-error=true
logging.level.org.springframework.jdbc.datasource.init=DEBUG

# JWT
app.jwt.secret=dGhpcyBpcyBhIHZlcnkgc2VjdXJlIGp3dCBzZWNyZXQgZm9yIHBldCBzaG9wIDIwMjQ=
app.jwt.expiration-ms=86400000

# Mercado Pago
mercadopago.access-token=${MERCADOPAGO_ACCESS_TOKEN:TEST-0000000000000000-000000-00000000000000000000000000000000-000000000}
mercadopago.success-url=${APP_URL:http://localhost:5173}/orders
mercadopago.failure-url=${APP_URL:http://localhost:5173}/cart
mercadopago.pending-url=${APP_URL:http://localhost:5173}/orders
